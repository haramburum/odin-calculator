<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/script.js" defer></script>
    <title>Calculator</title>
  </head>
  <body>
    <div class="calc">
      <div class="calc__display"></div>
      <div class="calc__btns">
        <button class="calc__numBtn btn">9</button>
        <button class="calc__numBtn btn">8</button>
        <button class="calc__numBtn btn">7</button>
        <button class="calc_backBtn btn">&#60;=</button>
        <button class="calc__clearBtn btn">Clr</button>
        <button class="calc__numBtn btn">6</button>
        <button class="calc__numBtn btn">5</button>
        <button class="calc__numBtn btn">4</button>
        <button class="calc__operBtn btn">+</button>
        <button class="calc__numBtn btn">3</button>
        <button class="calc__numBtn btn">2</button>
        <button class="calc__numBtn btn">1</button>
        <button class="calc__operBtn btn">-</button>
        <button class="calc__eqBtn btn">=</button>
        <button class="calc__numBtn btn">0</button>
        <button class="calc__operBtn btn">/</button>
        <button class="calc__operBtn btn">*</button>
        <button class="calc__dotBtn btn">.</button>
      </div>
    </div>
  </body>
</html>
