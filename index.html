<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./js/script.js" defer></script>
    <title>Calculator</title>
  </head>
  <body>
    <div class="calc">
      <div class="calc__display"></div>
      <div class="calc__btns">
        <button class="calc__clearBtn">Clear</button>
        <button class="calc__numBtn">1</button>
        <button class="calc__numBtn">2</button>
        <button class="calc__numBtn">3</button>
        <button class="calc__numBtn">4</button>
        <button class="calc__numBtn">5</button>
        <button class="calc__numBtn">6</button>
        <button class="calc__numBtn">7</button>
        <button class="calc__numBtn">8</button>
        <button class="calc__numBtn">9</button>
        <button class="calc__numBtn">0</button>
        <button class="calc__operBtn">+</button>
        <button class="calc__operBtn">-</button>
        <button class="calc__operBtn">*</button>
        <button class="calc__operBtn">/</button>
        <button class="calc__eqBtn">=</button>
      </div>
    </div>
  </body>
</html>
